<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pi Browser Bridge</title>
  <style>
    body { box-sizing: border-box; min-width: 320px; margin: 0; padding: 14px; font: 13px system-ui, sans-serif; color: #202124; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    label { display: block; margin: 8px 0 4px; font-weight: 600; }
    input { box-sizing: border-box; width: 100%; padding: 7px; border: 1px solid #c7c7c7; border-radius: 6px; font: inherit; }
    button { margin-top: 10px; margin-right: 6px; padding: 7px 10px; border: 0; border-radius: 6px; background: #1a73e8; color: white; cursor: pointer; font: inherit; }
    button.secondary { background: #5f6368; }
    button.danger { background: #c5221f; }
    button:disabled { opacity: 0.55; cursor: default; }
    .status { padding: 8px; border-radius: 6px; background: #f1f3f4; margin-bottom: 10px; white-space: pre-line; }
    .error { color: #c5221f; }
    .muted { color: #5f6368; }
  </style>
</head>
<body>
  <h1>Pi Browser Bridge</h1>
  <div id="status" class="status">Loading…</div>

  <label for="bridge-url">Bridge URL</label>
  <input id="bridge-url" placeholder="ws://127.0.0.1:12345">

  <label for="pairing-token">Pairing token</label>
  <input id="pairing-token" placeholder="Token from /browser-bridge pair">

  <button id="connect">Connect</button>
  <button id="disconnect" class="danger">Disconnect</button>
  <button id="activate" class="secondary">Activate current tab</button>

  <p id="message" class="muted"></p>
  <script type="module" src="dist/popup.js"></script>
</body>
</html>
